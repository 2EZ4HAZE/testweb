<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag ini yang memastikan website pas di layar HP/Tablet -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Untuk Kamu ❤️</title>
    <style>
        /* Pengaturan Dasar */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah layar scroll */
            color: #333;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.2);
            width: 85%;
            max-width: 400px; /* Sedikit dikecilkan agar pas di HP */
            position: relative;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #ff4d4d;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; /* Memastikan tombol tidak keluar kotak jika layar HP terlalu kecil */
        }

        .btn-wrapper {
            width: 100px; 
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #btnYes {
            background-color: #ff4d4d;
            color: white;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4);
            transition: transform 0.2s;
            height: 50px;
        }

        #btnYes:hover {
            transform: scale(1.05);
            background-color: #ff1a1a;
        }

        #btnNo {
            background-color: #d3d3d3;
            color: #333;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            height: 50px;
            width: 100px;
            transition: left 0.2s ease, top 0.2s ease;
            z-index: 999;
            /* Trik khusus HP: Mencegah efek zoom/scroll saat layar disentuh bertubi-tubi */
            touch-action: none; 
        }

        .heart {
            position: absolute;
            color: #ff4d4d;
            font-size: 24px;
            bottom: -50px;
            animation: floatUp linear infinite;
            z-index: 1;
            opacity: 0.8;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="questionPage">
        <h1>Eits, tunggu dulu! 🛑</h1>
        <p>Sebelum buka kadonya, jawab jujur dulu:<br><strong>Apakah kamu sayang aku? 🥺</strong></p>
        
        <div class="button-group">
            <button id="btnYes" onclick="answeredYes()">Iya, sayang banget! 💖</button>
            <div class="btn-wrapper">
                <!-- Hapus onmouseenter/ontouchstart di sini, kita atur lewat JS di bawah biar lebih rapi -->
                <button id="btnNo">Enggak!</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="surprisePage">
        <h1>Yeay! Aku juga sayang kamu! 🥰</h1>
        <h2 style="color: #ff4d4d; margin-top: -10px;">Happy Birthday & Happy Valentine! 🎂💖</h2>
        <p>Selamat bertambah usia, orang paling spesial! Semoga hari-harimu selalu dipenuhi kebahagiaan.</p>
        <p><strong>I Love You! ❤️</strong></p>
    </div>

    <script>
        let isRunning = false;
        const btnNo = document.getElementById('btnNo');

        // Menggabungkan deteksi sentuhan (HP/Tablet) dan kursor (Laptop)
        ['mouseover', 'touchstart'].forEach(eventType => {
            btnNo.addEventListener(eventType, function(event) {
                // Mencegah HP men-scroll layar atau mencoba klik tombol saat disentuh
                event.preventDefault(); 
                runAway();
            });
        });

        // Menambahkan aksi 'click' sebagai cadangan (jika dia sangat cepat memencetnya)
        btnNo.addEventListener('click', function(event) {
            event.preventDefault();
            runAway();
        });

        function runAway() {
            if (!isRunning) {
                btnNo.style.position = 'fixed';
                isRunning = true;
            }

            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;

            const maxX = screenWidth - btnWidth - 20;
            const maxY = screenHeight - btnHeight - 20;

            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        function answeredYes() {
            document.getElementById('questionPage').classList.add('hidden');
            document.getElementById('btnNo').style.display = 'none';
            document.getElementById('surprisePage').classList.remove('hidden');
            createHearts();
        }

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.classList.add('heart');
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = Math.random() * 3 + 3 + 's';
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 6000);
            }, 300);
        }
    </script>
</body>
</html>
